<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			http-equiv="Cache-Control"
			content="no-cache, no-store, must-revalidate, max-age: 0"
		/>
		<meta http-equiv="Pragma" content="no-cache" />
		<meta http-equiv="Expires" content="0" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="preconnect" href="https://cdn.vercel.com" crossorigin />

		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
			rel="stylesheet"
		/>

		<title data-react-helmet="true">
			Open source Observability platform | SigInsight
		</title>
		<meta
			data-react-helmet="true"
			property="og:title"
			content="Open source Observability platform | SigInsight"
		/>
		<meta
			data-react-helmet="true"
			name="description"
			content="SigInsight is an open source observability platform to help you find issues in your deployed applications & solve them quickly. It provides a single pane of glass for metrics, traces and logs with deep filtering and aggregation to pin down specific issues very quickly."
		/>
		<meta
			data-react-helmet="true"
			property="og:description"
			content="SigInsight is an open source observability platform to help you find issues in your deployed applications & solve them quickly. It provides a single pane of glass for metrics, traces and logs with deep filtering and aggregation to pin down specific issues very quickly."
		/>
		<meta
			data-react-helmet="true"
			name="twitter:card"
			content="summary_large_image"
		/>
		<meta data-react-helmet="true" name="docusaurus_locale" content="en" />
		<meta data-react-helmet="true" name="docusaurus_tag" content="default" />
		<meta name="robots" content="noindex" />
		<link data-react-helmet="true" rel="shortcut icon" href="/favicon.png" />
	</head>

	<body data-theme="default">
		<noscript>You need to enable JavaScript to run this app.</noscript>
		<div id="root"></div>

		<script type="text/javascript">
			window.AppcuesSettings = { enableURLDetection: true };
		</script>
		<script>
			var APPCUES_APP_ID = '<%- APPCUES_APP_ID %>';
			if (APPCUES_APP_ID) {
				(function (d, t) {
					var a = d.createElement(t);
					a.async = 1;
					a.src = '//fast.appcues.com/' + APPCUES_APP_ID + '.js';
					var s = d.getElementsByTagName(t)[0];
					s.parentNode.insertBefore(a, s);
				})(document, 'script');
			}
		</script>
		<link rel="stylesheet" href="/css/uPlot.min.css" />
		<script type="module" src="./src/index.tsx"></script>
	</body>
</html>
