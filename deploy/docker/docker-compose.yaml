x-common: &common
  networks:
    - siginsight-net
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"
x-clickhouse-defaults: &clickhouse-defaults
  !!merge <<: *common
  image: clickhouse/clickhouse-server:25.5.6
  tty: true
  labels:
    siginsight.io/scrape: "true"
    siginsight.io/port: "9363"
    siginsight.io/path: "/metrics"
  depends_on:
    init-clickhouse:
      condition: service_completed_successfully
  healthcheck:
    test:
      - CMD
      - wget
      - --spider
      - -q
      - 0.0.0.0:8123/ping
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144
  environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1
x-db-depend: &db-depend
  !!merge <<: *common
  depends_on:
    clickhouse:
      condition: service_healthy
services:
  init-clickhouse:
    !!merge <<: *common
    image: ${HISTOGRAM_QUANTILE_INIT_IMAGE:-ghcr.io/siginsight/clickhouse-init-histogram-quantile:25.5.6-latest}
    container_name: siginsight-init-clickhouse
    command:
      - bash
      - -c
      - |
        echo "Installing histogram-binary from bundled GHCR image"
        mkdir -p /var/lib/clickhouse/user_scripts
        cp /opt/siginsight/bin/histogramQuantile /var/lib/clickhouse/user_scripts/histogramQuantile
        chmod +x /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - ../common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
  clickhouse:
    !!merge <<: *clickhouse-defaults
    container_name: siginsight-clickhouse
    # ports:
    #   - "9000:9000"
    #   - "8123:8123"
    volumes:
      - ../common/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ../common/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ../common/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ../common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - clickhouse:/var/lib/clickhouse/
      # - ../common/clickhouse/storage.xml:/etc/clickhouse-server/config.d/storage.xml
  siginsight:
    !!merge <<: *db-depend
    image: ${SIGINSIGHT_IMAGE:-ghcr.io/siginsight/siginsight:${VERSION:-v1.6.0}}
    container_name: siginsight
    ports:
      - "8081:8080"
    volumes:
      - sqlite:/var/lib/siginsight/
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/siginsight/siginsight.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=secret
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - localhost:8080/api/v1/health
      interval: 30s
      timeout: 5s
      retries: 3
  otel-collector:
    !!merge <<: *db-depend
    image: ghcr.io/siginsight/siginsight-otel-collector:${OTELCOL_TAG:-v1.1.0}
    container_name: siginsight-otel-collector
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /siginsight-otel-collector migrate sync check &&
        /siginsight-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ../common/siginsight/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=siginsight-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGINSIGHT_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      # - "1777:1777"     # pprof extension
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
  siginsight-telemetrystore-migrator:
    !!merge <<: *db-depend
    image: ghcr.io/siginsight/siginsight-otel-collector:${OTELCOL_TAG:-v1.1.0}
    container_name: siginsight-telemetrystore-migrator
    environment:
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGINSIGHT_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /siginsight-otel-collector migrate bootstrap &&
        /siginsight-otel-collector migrate sync up &&
        /siginsight-otel-collector migrate async up
    restart: on-failure
networks:
  siginsight-net:
    name: siginsight-net
volumes:
  clickhouse:
    name: siginsight-clickhouse
  sqlite:
    name: siginsight-sqlite
