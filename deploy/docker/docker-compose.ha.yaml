version: "3"
x-common: &common
  networks:
    - siginsight-net
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"
x-clickhouse-defaults: &clickhouse-defaults
  !!merge <<: *common
  # addding non LTS version due to this fix https://github.com/ClickHouse/ClickHouse/commit/32caf8716352f45c1b617274c7508c86b7d1afab
  image: clickhouse/clickhouse-server:25.5.6
  tty: true
  labels:
    siginsight.io/scrape: "true"
    siginsight.io/port: "9363"
    siginsight.io/path: "/metrics"
  depends_on:
    init-clickhouse:
      condition: service_completed_successfully
    zookeeper-1:
      condition: service_healthy
    zookeeper-2:
      condition: service_healthy
    zookeeper-3:
      condition: service_healthy
  healthcheck:
    test:
      - CMD
      - wget
      - --spider
      - -q
      - 0.0.0.0:8123/ping
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144
  environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1
x-zookeeper-defaults: &zookeeper-defaults
  !!merge <<: *common
  image: signoz/zookeeper:3.7.1
  user: root
  labels:
    siginsight.io/scrape: "true"
    siginsight.io/port: "9141"
    siginsight.io/path: "/metrics"
  healthcheck:
    test:
      - CMD-SHELL
      - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
    interval: 30s
    timeout: 5s
    retries: 3
x-db-depend: &db-depend
  !!merge <<: *common
  depends_on:
    clickhouse:
      condition: service_healthy
    clickhouse-2:
      condition: service_healthy
    clickhouse-3:
      condition: service_healthy
services:
  init-clickhouse:
    !!merge <<: *common
    image: ${HISTOGRAM_QUANTILE_INIT_IMAGE:-ghcr.io/siginsight/clickhouse-init-histogram-quantile:25.5.6-latest}
    container_name: siginsight-init-clickhouse
    command:
      - bash
      - -c
      - |
        echo "Installing histogram-binary from bundled GHCR image"
        mkdir -p /var/lib/clickhouse/user_scripts
        cp /opt/siginsight/bin/histogramQuantile /var/lib/clickhouse/user_scripts/histogramQuantile
        chmod +x /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - ../common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
  zookeeper-1:
    !!merge <<: *zookeeper-defaults
    container_name: siginsight-zookeeper-1
    # ports:
    #   - "2181:2181"
    #   - "2888:2888"
    #   - "3888:3888"
    volumes:
      - zookeeper-1:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ZOO_SERVERS=0.0.0.0:2888:3888,zookeeper-2:2888:3888,zookeeper-3:2888:3888
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
  zookeeper-2:
    !!merge <<: *zookeeper-defaults
    container_name: siginsight-zookeeper-2
    # ports:
    #   - "2182:2181"
    #   - "2889:2888"
    #   - "3889:3888"
    volumes:
      - zookeeper-2:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=2
      - ZOO_SERVERS=zookeeper-1:2888:3888,0.0.0.0:2888:3888,zookeeper-3:2888:3888
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
  zookeeper-3:
    !!merge <<: *zookeeper-defaults
    container_name: siginsight-zookeeper-3
    # ports:
    #   - "2183:2181"
    #   - "2890:2888"
    #   - "3890:3888"
    volumes:
      - zookeeper-3:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=3
      - ZOO_SERVERS=zookeeper-1:2888:3888,zookeeper-2:2888:3888,0.0.0.0:2888:3888
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
  clickhouse:
    !!merge <<: *clickhouse-defaults
    container_name: siginsight-clickhouse
    # ports:
    #   - "9000:9000"
    #   - "8123:8123"
    #   - "9181:9181"
    volumes:
      - ../common/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ../common/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ../common/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ../common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - ../common/clickhouse/cluster.ha.xml:/etc/clickhouse-server/config.d/cluster.xml
      - clickhouse:/var/lib/clickhouse/
      # - ../common/clickhouse/storage.xml:/etc/clickhouse-server/config.d/storage.xml
  clickhouse-2:
    !!merge <<: *clickhouse-defaults
    container_name: siginsight-clickhouse-2
    # ports:
    #   - "9001:9000"
    #   - "8124:8123"
    #   - "9182:9181"
    volumes:
      - ../common/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ../common/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ../common/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ../common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - ../common/clickhouse/cluster.ha.xml:/etc/clickhouse-server/config.d/cluster.xml
      - clickhouse-2:/var/lib/clickhouse/
      # - ../common/clickhouse/storage.xml:/etc/clickhouse-server/config.d/storage.xml
  clickhouse-3:
    !!merge <<: *clickhouse-defaults
    container_name: siginsight-clickhouse-3
    # ports:
    #   - "9002:9000"
    #   - "8125:8123"
    #   - "9183:9181"
    volumes:
      - ../common/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ../common/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ../common/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ../common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - ../common/clickhouse/cluster.ha.xml:/etc/clickhouse-server/config.d/cluster.xml
      - clickhouse-3:/var/lib/clickhouse/
      # - ../common/clickhouse/storage.xml:/etc/clickhouse-server/config.d/storage.xml
  siginsight:
    !!merge <<: *db-depend
    image: ${SIGINSIGHT_IMAGE:-ghcr.io/siginsight/siginsight:${VERSION:-v1.5.0}}
    container_name: siginsight
    ports:
      - "8080:8080" # SigInsight port
    volumes:
      - sqlite:/var/lib/siginsight/
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/siginsight/siginsight.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=secret
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - localhost:8080/api/v1/health
      interval: 30s
      timeout: 5s
      retries: 3
  otel-collector:
    !!merge <<: *db-depend
    image: ghcr.io/siginsight/siginsight-otel-collector:${OTELCOL_TAG:-v1.0.4}
    container_name: siginsight-otel-collector
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /siginsight-otel-collector migrate sync check &&
        /siginsight-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ../common/siginsight/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=siginsight-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGINSIGHT_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      # - "1777:1777"     # pprof extension
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
  siginsight-telemetrystore-migrator:
    !!merge <<: *db-depend
    image: ghcr.io/siginsight/siginsight-otel-collector:${OTELCOL_TAG:-v1.0.4}
    container_name: siginsight-telemetrystore-migrator
    environment:
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGINSIGHT_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /siginsight-otel-collector migrate bootstrap &&
        /siginsight-otel-collector migrate sync up &&
        /siginsight-otel-collector migrate async up
    restart: on-failure
networks:
  siginsight-net:
    name: siginsight-net
volumes:
  clickhouse:
    name: siginsight-clickhouse
  clickhouse-2:
    name: siginsight-clickhouse-2
  clickhouse-3:
    name: siginsight-clickhouse-3
  sqlite:
    name: siginsight-sqlite
  zookeeper-1:
    name: siginsight-zookeeper-1
  zookeeper-2:
    name: siginsight-zookeeper-2
  zookeeper-3:
    name: siginsight-zookeeper-3
