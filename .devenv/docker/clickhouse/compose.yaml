services:
  init-clickhouse:
    image: ${HISTOGRAM_QUANTILE_INIT_IMAGE:-ghcr.io/siginsight/clickhouse-init-histogram-quantile:25.5.6-latest}
    container_name: init-clickhouse
    command:
      - bash
      - -c
      - |
        echo "Installing histogram-binary from bundled GHCR image"
        mkdir -p /var/lib/clickhouse/user_scripts
        cp /opt/siginsight/bin/histogramQuantile /var/lib/clickhouse/user_scripts/histogramQuantile
        chmod +x /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - ${PWD}/fs/tmp/var/lib/clickhouse/user_scripts/:/var/lib/clickhouse/user_scripts/
  clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: clickhouse
    volumes:
      - ${PWD}/fs/etc/clickhouse-server/config.d/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ${PWD}/fs/etc/clickhouse-server/users.d/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ${PWD}/fs/tmp/var/lib/clickhouse/:/var/lib/clickhouse/
      - ${PWD}/fs/tmp/var/lib/clickhouse/user_scripts/:/var/lib/clickhouse/user_scripts/
      - ${PWD}/../../../deploy/common/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
    ports:
      - '127.0.0.1:8123:8123'
      - '127.0.0.1:9000:9000'
    tty: true
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - 0.0.0.0:8123/ping
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      init-clickhouse:
        condition: service_completed_successfully
      keeper-1:
        condition: service_healthy
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
  keeper-1:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: keeper-1
    command:
      - /bin/bash
      - -ec
      - |
        mkdir -p /var/lib/clickhouse-keeper/coordination/log /var/lib/clickhouse-keeper/coordination/snapshots
        chown clickhouse:clickhouse /var/lib/clickhouse-keeper /var/lib/clickhouse-keeper/coordination /var/lib/clickhouse-keeper/coordination/log /var/lib/clickhouse-keeper/coordination/snapshots
        exec clickhouse su clickhouse:clickhouse clickhouse-keeper --config-file=/etc/clickhouse-keeper/keeper_config.xml
    volumes:
      - ${PWD}/../../../deploy/common/clickhouse/keeper/keeper.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - ${PWD}/fs/tmp/keeper:/var/lib/clickhouse-keeper
    ports:
      - 127.0.0.1:9181:9181
    healthcheck:
      test:
        - CMD
        - clickhouse-keeper-client
        - --host=localhost
        - --port=9181
        - --query=ls
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
  telemetrystore-migrator:
    image: ghcr.io/siginsight/siginsight-otel-collector:${OTELCOL_TAG:-v1.0.4}
    container_name: telemetrystore-migrator
    environment:
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGINSIGHT_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGINSIGHT_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
    - -c 
    - |
      /siginsight-otel-collector migrate bootstrap &&
      /siginsight-otel-collector migrate sync up &&
      /siginsight-otel-collector migrate async up
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: on-failure
