name: build-community

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup-qemu
        uses: docker/setup-qemu-action@v3
      - name: setup-buildx
        uses: docker/setup-buildx-action@v3
      - name: setup-node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: install-cross-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
      - name: compute-image-tags
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            {
              echo "tags<<EOF"
              echo "ghcr.io/siginsight/siginsight:${version}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "ghcr.io/siginsight/siginsight:latest"
              echo "ghcr.io/siginsight/siginsight:main-${GITHUB_SHA::7}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: install-frontend-deps
        working-directory: frontend
        run: yarn install --frozen-lockfile || yarn install
      - name: build-frontend
        working-directory: frontend
        run: yarn build
      - name: build-community-binaries
        run: make go-build-community js-build
      - name: ghcr-login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build-and-push-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/community/Dockerfile.multi-arch
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
