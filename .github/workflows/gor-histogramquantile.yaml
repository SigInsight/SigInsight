name: gor-histogramquantile

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/gor-histogramquantile.yaml
      - scripts/clickhouse/histogramquantile/**
      - deploy/common/clickhouse/custom-function.xml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        clickhouse-version:
          - 25.5.6
          - 25.12.5
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: compute-tags
        id: meta
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/siginsight/clickhouse-init-histogram-quantile:${{ matrix.clickhouse-version }}-latest"
            echo "ghcr.io/siginsight/clickhouse-init-histogram-quantile:${{ matrix.clickhouse-version }}-main-${GITHUB_SHA::7}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: setup-qemu
        uses: docker/setup-qemu-action@v3
      - name: setup-buildx
        uses: docker/setup-buildx-action@v3
      - name: ghcr-login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/clickhouse/histogramquantile/ClickHouse.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            CLICKHOUSE_VERSION=${{ matrix.clickhouse-version }}
          tags: ${{ steps.meta.outputs.tags }}
