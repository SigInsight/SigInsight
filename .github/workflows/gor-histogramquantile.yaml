name: gor-histogramquantile

on:
  push:
    tags:
      - histogram-quantile/v*

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        clickhouse-version:
          - 25.5.6
          - 25.12.5
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: extract-version
        id: version
        run: |
          echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - name: image-version
        id: image-version
        run: |
          echo "value=${GITHUB_REF_NAME#histogram-quantile/}" >> "$GITHUB_OUTPUT"
      - name: setup-qemu
        uses: docker/setup-qemu-action@v3
      - name: setup-buildx
        uses: docker/setup-buildx-action@v3
      - name: ghcr-login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/clickhouse/histogramquantile/ClickHouse.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            CLICKHOUSE_VERSION=${{ matrix.clickhouse-version }}
          tags: |
            ghcr.io/siginsight/clickhouse-init-histogram-quantile:${{ matrix.clickhouse-version }}-${{ steps.image-version.outputs.value }}
