name: integrationci

on:
  pull_request:
    branches:
      - main

jobs:
  fmtlint:
    # Deprecated: lightweight formatting/linting for tests/integration only.
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: uv
        uses: astral-sh/setup-uv@v4
      - name: install
        run: |
          cd tests/integration && uv sync --frozen
      - name: fmt
        run: |
          make py-fmt
          git diff --exit-code -- tests/integration/
      - name: lint
        run: |
          make py-lint
  test:
    strategy:
      fail-fast: false
      matrix:
        src:
          - bootstrap
          - passwordauthn
          - callbackauthn
          - dashboard
          - logspipelines
          - preference
          - querier
          - role
          - ttl
          - alerts
          - rootuser
          - cloudintegrations
        sqlstore-provider:
          - sqlite
        clickhouse-version:
          - 25.5.6
        schema-migrator-version:
          - v1.0.0
    # Re-enabled for community edition: now builds from cmd/community/Dockerfile.integration
    if: |
      ((github.event_name == 'pull_request' && ! github.event.pull_request.head.repo.fork && github.event.pull_request.user.login != 'dependabot[bot]') ||
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'safe-to-test')))
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: uv
        uses: astral-sh/setup-uv@v4
      - name: install
        run: |
          cd tests/integration && uv sync --frozen
      - name: run
        run: |
          cd tests/integration && \
            uv run pytest \
            --basetemp=./tmp/ \
            src/${{matrix.src}} \
            --sqlstore-provider ${{matrix.sqlstore-provider}} \
            --clickhouse-version ${{matrix.clickhouse-version}} \
            --schema-migrator-version ${{matrix.schema-migrator-version}}
